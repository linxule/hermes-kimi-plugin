name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — catches drift if upstream Hermes Agent removes
    # or renames a symbol this plugin depends on. Without the schedule the
    # only signal would be the next push.
    - cron: "0 6 * * *"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is intentionally excluded: hermes-agent declares
        # `requires-python = ">=3.11"` in its pyproject, so a 3.10 leg fails
        # at the install step with "Package 'hermes-agent' requires a
        # different Python: 3.10.x not in '>=3.11'". Mirror that floor here.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install hermes-agent (clean dep target)
        # feat/platform-kimi-enum is the prospective bundled-PR branch — it
        # carries the registry hook + Platform.KIMI enum, but NOT this plugin's
        # in-tree code. Pinning to it gives us a clean dependency that doesn't
        # ship a competing plugins/kimi/ alongside this standalone repo.
        #
        # Once both upstream PRs land (or get bundled), switch this to
        # 'hermes-agent>=<version>' from PyPI.
        run: |
          pip install 'hermes-agent @ git+https://github.com/linxule/hermes-agent.git@feat/platform-kimi-enum'

      - name: Install plugin dev deps
        # The wheel is intentionally metadata-only (see pyproject.toml).
        # This installs pytest / pytest-asyncio / pyyaml — the plugin code
        # itself runs from the repo root via conftest.py's sys.path insert.
        run: pip install -e '.[dev]'

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Smoke-test plugin discovery + register handshake
        # Replicates the Hermes plugin loader's directory-module setup exactly
        # (see hermes_cli/plugins.py::_load_directory_module). Confirms that
        # register() can be invoked against the installed hermes-agent without
        # raising, that it binds Platform.KIMI to a callable factory, and that
        # the relative imports inside kimi/__init__.py resolve under the
        # hermes_plugins.<name> namespace. Catches gaps the unit suite can't
        # (the unit suite exercises the adapter; this exercises the loader
        # handshake).
        run: |
          python - <<'EOF'
          import sys
          import types
          import importlib.util

          _NS_PARENT = 'hermes_plugins'

          # Ensure the namespace parent package exists in sys.modules. Without
          # this, ``from . import _compat`` inside kimi/__init__.py raises
          # ModuleNotFoundError because the parent package isn't findable.
          if _NS_PARENT not in sys.modules:
              ns_pkg = types.ModuleType(_NS_PARENT)
              ns_pkg.__path__ = []
              ns_pkg.__package__ = _NS_PARENT
              sys.modules[_NS_PARENT] = ns_pkg

          module_name = f'{_NS_PARENT}.kimi'
          spec = importlib.util.spec_from_file_location(
              module_name,
              'kimi/__init__.py',
              submodule_search_locations=['kimi'],
          )
          mod = importlib.util.module_from_spec(spec)
          mod.__package__ = module_name
          mod.__path__ = ['kimi']
          sys.modules[module_name] = mod
          spec.loader.exec_module(mod)

          from gateway.config import Platform
          recorded = {}
          class StubCtx:
              def register_platform_adapter(self, platform, factory, requirements_check=None):
                  recorded['platform'] = platform
                  recorded['factory'] = factory
                  recorded['requirements_check'] = requirements_check

          mod.register(StubCtx())
          assert recorded['platform'] is Platform.KIMI, (
              f"Expected Platform.KIMI, got {recorded['platform']!r}"
          )
          assert callable(recorded['factory']), "factory must be callable"
          assert callable(recorded['requirements_check']), "requirements_check must be callable"
          print('smoke ok: register() bound the kimi factory to Platform.KIMI')
          EOF
